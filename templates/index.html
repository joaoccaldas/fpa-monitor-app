<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingPong — FP&A Monitor Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
  <style>
    body { background-color: #f8f9fa; }
    .dashboard-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 2rem 0; margin-bottom: 2rem;
    }
    .card { box-shadow: 0 .125rem .25rem rgba(0,0,0,.075); border: none; }
    .upload-card { border: 2px dashed #667eea; background: linear-gradient(135deg, rgba(102,126,234,.05) 0%, rgba(118,75,162,.05) 100%); transition: all .3s; }
    .upload-card:hover { border-color: #764ba2; box-shadow: 0 .5rem 1rem rgba(102,126,234,.2); }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <header class="dashboard-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="h3 m-0">PingPong</h1>
        <span class="opacity-75">Minimal FP&A dashboard</span>
      </div>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row g-4">
      <!-- Upload -->
      <div class="col-12">
        <div class="card upload-card">
          <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-cloud-upload"></i> Upload data (CSV/XLS/XLSX)</h2>
            <form id="upload-form" class="d-flex gap-2" enctype="multipart/form-data">
              <input class="form-control" type="file" name="file" id="file" accept=".csv,.xls,.xlsx" required />
              <button class="btn btn-primary" type="submit">Upload</button>
            </form>
            <div id="upload-status" class="mt-3 small text-muted"></div>
          </div>
        </div>
      </div>

      <!-- Analyze -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-robot"></i> Analyze with LLM</h2>
            <form id="analyze-form" class="d-flex gap-2">
              <input class="form-control" type="text" id="question" placeholder="Ask a question about your data..." />
              <button class="btn btn-secondary" type="submit">Analyze</button>
            </form>
            <div id="analysis" class="mt-3">
              <pre class="small" id="analysis-text"></pre>
            </div>
          </div>
        </div>
      </div>

      <!-- Visualize -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-graph-up-arrow"></i> Visualize</h2>
            <form id="visualize-form" class="d-flex gap-2 align-items-center">
              <label class="form-label m-0" for="chart">Chart</label>
              <select id="chart" class="form-select" style="max-width: 200px;">
                <option value="auto" selected>Auto</option>
                <option value="line">Line</option>
                <option value="bar">Bar</option>
                <option value="pie">Pie</option>
              </select>
              <button class="btn btn-success" type="submit">Generate</button>
            </form>
            <div id="charts" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function postJSON(url, body) {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
      return res.json();
    }

    // Upload
    const uploadForm = document.getElementById('upload-form');
    const uploadStatus = document.getElementById('upload-status');
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      uploadStatus.textContent = 'Uploading...';
      const formData = new FormData(uploadForm);
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          uploadStatus.textContent = `Uploaded ${data.rows} rows, ${data.cols} columns.`;
        } else {
          uploadStatus.textContent = data.error || 'Upload failed.';
        }
      } catch (err) {
        uploadStatus.textContent = 'Network error during upload.';
      }
    });

    // Analyze
    const analyzeForm = document.getElementById('analyze-form');
    const analysisText = document.getElementById('analysis-text');
    analyzeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      analysisText.textContent = 'Thinking...';
      const question = document.getElementById('question').value || undefined;
      try {
        const data = await postJSON('/analyze', { question });
        analysisText.textContent = data.success ? (data.analysis || '') : (data.error || 'Analyze failed.');
      } catch (err) {
        analysisText.textContent = 'Network error during analysis.';
      }
    });

    // Visualize
    const visualizeForm = document.getElementById('visualize-form');
    const chartsDiv = document.getElementById('charts');

    function renderCharts(charts) {
      chartsDiv.innerHTML = '';
      for (const c of charts) {
        const card = document.createElement('div');
        card.className = 'border rounded p-3 mb-3';
        const title = document.createElement('div');
        title.className = 'fw-semibold mb-2';
        title.textContent = c.title || c.type;
        card.appendChild(title);

        if (c.type === 'line' || c.type === 'bar') {
          const canvas = document.createElement('canvas');
          canvas.height = 220;
          card.appendChild(canvas);
          chartsDiv.appendChild(card);
          // Simple Chart.js rendering
          new Chart(canvas, {
            type: c.type,
            data: { labels: c.x_data, datasets: [{ label: c.y_label, data: c.y_data, borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,.35)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { autoSkip: true, maxTicksLimit: 8 } } } }
          });
          continue;
        }
        if (c.type === 'pie') {
          const canvas = document.createElement('canvas');
          canvas.height = 220;
          card.appendChild(canvas);
          chartsDiv.appendChild(card);
          new Chart(canvas, {
            type: 'pie',
            data: { labels: c.labels, datasets: [{ data: c.values, backgroundColor: ['#667eea','#764ba2','#e67e22','#16a085','#2ecc71','#1abc9c','#d35400','#8e44ad','#2980b9','#c0392b'] }] },
            options: { responsive: true, maintainAspectRatio: false }
          });
          continue;
        }
        chartsDiv.appendChild(card);
      }
    }

    visualizeForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      chartsDiv.textContent = 'Generating charts...';
      const chart = document.getElementById('chart').value;
      try {
        const data = await postJSON('/visualize', { chart });
        if (data.success) {
          renderCharts(data.charts || []);
        } else {
          chartsDiv.textContent = data.error || 'Visualization failed.';
        }
      } catch (err) {
        chartsDiv.textContent = 'Network error during visualization.';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</body>
</html>
